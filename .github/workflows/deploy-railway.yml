name: Deploy to Railway (template)

on:
  push:
    branches: [ main, master, clean-main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Install Railway CLI
        run: npm install -g @railway/cli || npm install -g railway

      - name: Deploy to Railway (via CLI)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          railway login --token "$RAILWAY_TOKEN"
          # If not initialized, user should have run `railway init` locally and committed railway settings
          railway up --detach || echo "railway up failed - ensure project is linked or use Railway GitHub integration"

      - name: Success
        run: echo "Deployment job finished (check Railway dashboard for status)."
